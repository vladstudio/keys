# Keys configuration — https://apps.vlad.studio/keys
#
# Key names: a-z, 0-9, f1-f20, return, tab, space, delete, escape,
#   caps_lock, forward_delete, up, down, left, right,
#   minus, equal, left_bracket, right_bracket, backslash,
#   semicolon, quote, grave, comma, period, slash,
#   shift, control, option, command (and right_* variants)
#
# Modifiers in combos: option+shift+a
# Sequences: control, control (comma-separated, no quoting needed)
# Special outputs: snippets, toggle_input, open(AppName), bash(command),
#   paste(text), ignore

[remap]
caps_lock: f20
option+shift+a: control+b
control, control: snippets
f5: open(Safari)
f6: bash(say hello)

[snippet]
Hello world
em: my.email@example.com
"Best regards,
Steve"
